<!DOCTYPE html>
<html lang="en" class="qa-root" data-qa-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parameter panel — QA Extension SDK</title>
    <link rel="stylesheet" href="../src/styles.css" />
    <link rel="stylesheet" href="./shared/layout.css" />
  </head>
  <body class="demo-body">
    <header class="demo-header">
      <h1 class="demo-title">Parameter panel</h1>
      <nav class="demo-nav" aria-label="Examples">
        <a href="./index.html">Overview</a>
        <a href="./buttons.html">Buttons</a>
        <a href="./sliders.html">Sliders</a>
        <a href="./dialog.html">Dialog</a>
        <a href="./parameter-panel.html" aria-current="page">Parameter panel</a>
        <a href="./theme-toggle.html">Theme toggle</a>
      </nav>
    </header>

    <section class="demo-panel demo-stack">
      <div class="qa-slider-row">
        <span class="qa-label__text">Drive</span>
        <input class="qa-slider" type="range" id="drive" min="0" max="100" value="35" />
        <span class="qa-slider-row__value" data-for="drive">35%</span>
      </div>

      <div class="qa-slider-row">
        <span class="qa-label__text">Tone</span>
        <input class="qa-slider" type="range" id="tone" min="0" max="100" value="58" />
        <span class="qa-slider-row__value" data-for="tone">58%</span>
      </div>

      <div class="qa-slider-row">
        <span class="qa-label__text">Mix</span>
        <input class="qa-slider" type="range" id="mix" min="0" max="100" value="100" />
        <span class="qa-slider-row__value" data-for="mix">100%</span>
      </div>

      <div class="qa-button-group">
        <button type="button" class="qa-button" id="bypass" aria-pressed="false">Bypass</button>
        <button type="button" class="qa-button" id="reset">Reset</button>
      </div>
    </section>

    <script type="module">
      import { bindSliderFill } from "./shared/slider-fill.js";

      const defaults = { drive: 35, tone: 58, mix: 100 };

      document.querySelectorAll(".qa-slider").forEach((slider) => {
        const readout = document.querySelector(`[data-for="${slider.id}"]`);
        bindSliderFill(slider);

        slider.addEventListener("input", () => {
          if (readout) readout.textContent = `${slider.value}%`;
        });
      });

      document.getElementById("bypass").addEventListener("click", (event) => {
        const button = event.currentTarget;
        const pressed = button.getAttribute("aria-pressed") === "true";
        button.setAttribute("aria-pressed", pressed ? "false" : "true");
      });

      document.getElementById("reset").addEventListener("click", () => {
        for (const [id, value] of Object.entries(defaults)) {
          const slider = document.getElementById(id);
          slider.value = String(value);
          slider.dispatchEvent(new Event("input"));
        }
        document.getElementById("bypass").setAttribute("aria-pressed", "false");
      });
    </script>
  </body>
</html>
