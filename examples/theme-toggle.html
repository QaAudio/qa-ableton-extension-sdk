<!DOCTYPE html>
<html lang="en" class="qa-root" data-qa-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Theme toggle — QA Extension SDK</title>
    <link rel="stylesheet" href="../src/styles.css" />
    <link rel="stylesheet" href="./shared/layout.css" />
  </head>
  <body class="demo-body">
    <header class="demo-header">
      <h1 class="demo-title">Theme toggle</h1>
      <nav class="demo-nav" aria-label="Examples">
        <a href="./index.html">Overview</a>
        <a href="./buttons.html">Buttons</a>
        <a href="./sliders.html">Sliders</a>
        <a href="./dialog.html">Dialog</a>
        <a href="./parameter-panel.html">Parameter panel</a>
        <a href="./theme-toggle.html" aria-current="page">Theme toggle</a>
      </nav>
    </header>

    <section class="demo-section">
      <h2>Live dark / light tokens</h2>
      <p class="qa-label__hint">
        Sets <code>data-qa-theme</code> on <code>&lt;html&gt;</code>, matching
        <code>createThemeProvider()</code> from the JS API.
      </p>
      <div class="qa-button-group">
        <button type="button" class="qa-button" id="theme-dark" aria-pressed="true">Dark</button>
        <button type="button" class="qa-button" id="theme-light" aria-pressed="false">Light</button>
      </div>
    </section>

    <section class="demo-section">
      <h2>Preview</h2>
      <div class="demo-panel demo-stack">
        <div class="qa-slider-row">
          <span class="qa-label__text">Level</span>
          <input class="qa-slider" type="range" id="level" min="0" max="100" value="48" />
          <span class="qa-slider-row__value">48%</span>
        </div>
        <div class="qa-button-group qa-button-group--end">
          <button type="button" class="qa-button">Cancel</button>
          <button type="button" class="qa-button">Apply</button>
        </div>
      </div>
    </section>

    <script type="module">
      import { bindSliderFill } from "./shared/slider-fill.js";

      const root = document.documentElement;
      const darkButton = document.getElementById("theme-dark");
      const lightButton = document.getElementById("theme-light");

      function setTheme(variant) {
        root.setAttribute("data-qa-theme", variant);
        darkButton.setAttribute("aria-pressed", variant === "dark" ? "true" : "false");
        lightButton.setAttribute("aria-pressed", variant === "light" ? "true" : "false");
      }

      darkButton.addEventListener("click", () => setTheme("dark"));
      lightButton.addEventListener("click", () => setTheme("light"));

      bindSliderFill(document.getElementById("level"));
    </script>
  </body>
</html>
