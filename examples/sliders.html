<!DOCTYPE html>
<html lang="en" class="qa-root" data-qa-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sliders — QA Extension SDK</title>
    <link rel="stylesheet" href="../src/styles.css" />
    <link rel="stylesheet" href="./shared/layout.css" />
  </head>
  <body class="demo-body">
    <header class="demo-header">
      <h1 class="demo-title">Sliders</h1>
      <nav class="demo-nav" aria-label="Examples">
        <a href="./index.html">Overview</a>
        <a href="./buttons.html">Buttons</a>
        <a href="./sliders.html" aria-current="page">Sliders</a>
        <a href="./dialog.html">Dialog</a>
        <a href="./parameter-panel.html">Parameter panel</a>
        <a href="./theme-toggle.html">Theme toggle</a>
      </nav>
    </header>

    <section class="demo-section">
      <h2>Labeled slider</h2>
      <label class="qa-label" for="amount">
        <span class="qa-label__text">Amount</span>
        <input class="qa-slider" type="range" id="amount" min="0" max="100" value="40" />
      </label>
    </section>

    <section class="demo-section">
      <h2>Parameter row with value</h2>
      <div class="qa-slider-row">
        <span class="qa-label__text">Dry/Wet</span>
        <input class="qa-slider" type="range" id="dry-wet" min="0" max="100" value="72" />
        <span class="qa-slider-row__value" id="dry-wet-value">72%</span>
      </div>
    </section>

    <section class="demo-section">
      <h2>Disabled</h2>
      <input class="qa-slider" type="range" min="0" max="100" value="25" disabled />
    </section>

    <script type="module">
      import { bindSliderFill } from "./shared/slider-fill.js";

      const dryWet = document.getElementById("dry-wet");
      const dryWetValue = document.getElementById("dry-wet-value");

      document.querySelectorAll(".qa-slider").forEach((slider) => {
        bindSliderFill(slider);
        slider.addEventListener("input", () => {
          if (slider.id === "dry-wet") {
            dryWetValue.textContent = `${slider.value}%`;
          }
        });
      });
    </script>
  </body>
</html>
